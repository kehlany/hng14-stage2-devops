name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 api/main.py worker/worker.py --max-line-length=120

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ESLint
        run: |
          cd frontend
          npm install
          npm install eslint --save-dev

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint app.js

      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint Dockerfile.api
          hadolint Dockerfile.worker
          hadolint Dockerfile.frontend

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest .
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push Worker image
        run: |
          docker build -f Dockerfile.worker -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest .
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -f Dockerfile.frontend -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest .
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scanning
        run: |
          docker build -f Dockerfile.api -t localhost:5000/api:latest .
          docker build -f Dockerfile.worker -t localhost:5000/worker:latest .
          docker build -f Dockerfile.frontend -t localhost:5000/frontend:latest .

      - name: Install Trivy
        run: |
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format sarif --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format sarif --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format sarif --output trivy-frontend.sarif \
            localhost:5000/frontend:latest

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=testpassword123" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Build images
        run: |
          docker build -f Dockerfile.api -t api:latest .
          docker build -f Dockerfile.worker -t worker:latest .
          docker build -f Dockerfile.frontend -t frontend:latest .

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Submit job and poll for completion
        run: |
          MAX_RETRIES=20
          RETRY_INTERVAL=5

          echo "Submitting job..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          echo "Polling for job completion..."
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS_RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', ''))")
            echo "Attempt $i — Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi

            sleep $RETRY_INTERVAL
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=testpassword123" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Build new images
        run: |
          docker build -f Dockerfile.api -t api:new .
          docker build -f Dockerfile.worker -t worker:new .
          docker build -f Dockerfile.frontend -t frontend:new .

      - name: Rolling update
        run: |
          SERVICES="api worker frontend"

          for SERVICE in $SERVICES; do
            echo "Rolling update for $SERVICE..."

            OLD_CONTAINER=$(docker ps -q --filter "name=${SERVICE}" 2>/dev/null || echo "")

            docker run -d --name ${SERVICE}_new \
              --network hng14-stage2-devops_internal \
              --env-file .env \
              ${SERVICE}:new

            echo "Waiting for ${SERVICE}_new to be healthy..."
            ELAPSED=0
            while [ $ELAPSED -lt 60 ]; do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ${SERVICE}_new 2>/dev/null || echo "none")
              if [ "$HEALTH" = "healthy" ]; then
                echo "${SERVICE}_new is healthy, stopping old container..."
                if [ -n "$OLD_CONTAINER" ]; then
                  docker stop $OLD_CONTAINER
                  docker rm $OLD_CONTAINER
                fi
                break
              fi
              if [ $ELAPSED -ge 60 ]; then
                echo "Health check failed for ${SERVICE}_new within 60s, aborting..."
                docker stop ${SERVICE}_new
                docker rm ${SERVICE}_new
                exit 1
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
          done

          echo "Rolling update complete"
